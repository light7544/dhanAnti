services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antigravity-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    # No volumes for production - source code is built into the image

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antigravity-frontend-prod
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: antigravity-network
