services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antigravity-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_modules:/app/venv
    env_file:
      - ./backend/.env
    # Restart unless explicitly stopped to recover from Dhan WebSocket drops
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antigravity-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
    restart: on-failure
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  backend_modules:
  frontend_modules:
